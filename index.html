<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球重大事件汇总 | 实时新闻分析</title>
    <!-- 可选：引入外部样式/图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
        }

        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        .update-time {
            color: #6c757d;
            font-size: 0.9rem;
        }

        /* 分析区域样式 */
        .analysis-container {
            display: flex;
            gap: 25px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .analysis-card {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .analysis-card h3 {
            color: #495057;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            align-items: center;
        }

        .analysis-card h3 i {
            margin-right: 8px;
            color: #007bff;
        }

        /* 关键词样式 */
        .keywords-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .keyword-item {
            padding: 8px 15px;
            background: #e7f5ff;
            color: #0277bd;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .keyword-item:hover {
            background: #007bff;
            color: white;
            transform: translateY(-2px);
        }

        /* 分类统计样式 */
        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #e9ecef;
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-name {
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .category-name::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* 不同分类的颜色标识 */
        .category-name[title="国际新闻"]::before { background: #007bff; }
        .category-name[title="国内要闻"]::before { background: #28a745; }
        .category-name[title="财经大事"]::before { background: #ffc107; }
        .category-name[title="全球时政"]::before { background: #dc3545; }
        .category-name[title="突发新闻"]::before { background: #6610f2; }

        .category-value {
            color: #6c757d;
            font-size: 0.85rem;
        }

        /* 新闻列表样式 */
        .news-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .news-section h3 {
            color: #495057;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .news-section h3 i {
            margin-right: 8px;
            color: #28a745;
        }

        .news-list {
            list-style: none;
        }

        .news-item {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            transition: background 0.2s;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-item:hover {
            background: #f8f9fa;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .category-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            color: white;
        }

        /* 分类标签配色 */
        .category-tag.international { background: #007bff; }
        .category-tag.domestic { background: #28a745; }
        .category-tag.finance { background: #ffc107; color: #212529; }
        .category-tag.politics { background: #dc3545; }
        .category-tag.breaking { background: #6610f2; }

        .publish-time {
            font-size: 0.8rem;
            color: #6c757d;
        }

        .news-title {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: color 0.2s;
        }

        .news-title:hover {
            color: #007bff;
            text-decoration: underline;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .analysis-container {
                gap: 15px;
            }

            .analysis-card, .news-section {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <div class="header">
        <h1>全球重大事件汇总</h1>
        <div class="update-time">最后更新时间：{{UPDATED_AT}}</div>
    </div>

    <!-- 分析数据区域 -->
    <div class="analysis-container">
        <!-- 热点关键词 -->
        <div class="analysis-card">
            <h3><i class="fa fa-tags"></i> 热点关键词</h3>
            <div class="keywords-wrapper">
                {{TOP_KEYWORDS}}
            </div>
        </div>

        <!-- 分类统计 -->
        <div class="analysis-card">
            <h3><i class="fa fa-bar-chart"></i> 新闻分类统计</h3>
            <div class="categories-wrapper">
                {{CATEGORY_STATS}}
            </div>
        </div>
    </div>

    <!-- 新闻列表区域 -->
    <div class="news-section">
        <h3><i class="fa fa-newspaper-o"></i> 最新新闻列表</h3>
        <ul class="news-list">
            {{NEWS_ITEMS}}
        </ul>
    </div>

    <!-- 可选：页脚 -->
    <footer style="text-align: center; margin-top: 30px; color: #6c757d; font-size: 0.8rem;">
        <p>数据来源：各大新闻媒体 RSS 源 | 分析基于关键词频率统计</p>
    </footer>

    <!-- 兼容注释标记（备用） -->
    <!-- NEWS_ITEMS_START -->
    <!-- NEWS_ITEMS_END -->
    <!-- TOP_KEYWORDS_START -->
    <!-- TOP_KEYWORDS_END -->
    <!-- CATEGORY_STATS_START -->
    <!-- CATEGORY_STATS_END -->
</body>
</html>
