<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>科技新闻自动更新</title>
  <style>
    :root { --fg:#111; --muted:#666; --bg:#fff; --card:#f6f7f9; --link:#0b57d0; }
    body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; color:var(--fg); background:var(--bg); }
    .wrap { max-width: 920px; margin: 0 auto; padding: 28px 16px 60px; }
    header { display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    h1 { font-size: 22px; margin: 0; }
    .meta { color: var(--muted); font-size: 13px; }
    .card { margin-top: 16px; background: var(--card); border-radius: 12px; padding: 14px 14px; }
    ul { list-style: none; padding: 0; margin: 0; }
    .item { padding: 10px 8px; border-bottom: 1px solid rgba(0,0,0,.06); display:flex; gap:10px; align-items:baseline; justify-content:space-between; }
    .item:last-child { border-bottom: none; }
    a.title { color: var(--link); text-decoration: none; line-height: 1.35; }
    a.title:hover { text-decoration: underline; }
    .time { color: var(--muted); font-size: 12px; white-space: nowrap; }
    footer { margin-top: 18px; color: var(--muted); font-size: 12px; }
    code { background: rgba(0,0,0,.06); padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>科技新闻自动更新</h1>
      <div class="meta">最近更新：<span id="updated">{{UPDATED_AT}}</span></div>
    </header>

    <div class="card">
      <ul>
        {{NEWS_ITEMS}}
      </ul>
    </div>

    <footer>
      <div>数据来源：RSS（示例默认 IT之家）。</div>
      <div>自动化：GitHub Actions 每 6 小时运行 <code>update_news.py</code> 并提交生成的 <code>index.html</code>。</div>
    </footer>
  </div>
</body>
</html>
